specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Nebius
providerId: nebius
created: '2026-05-22'
modified: '2026-05-22'
tags:
- AI
- Cloud
- Compute
- GPU
- HPC
- Inference
- Kubernetes
- Machine Learning
- Storage
description: Machine-readable plans scaffold for the Nebius API surface. Conforms to the API Commons Plans schema. Tier limits
  and prices are scaffold defaults; replace with provider-published values.
plans:
- id: nebius-free
  name: Free
  type: freemium
  description: Free entry tier for the Nebius API surface. Intended for evaluation, prototyping, and low-volume integrations.
    Real limits and pricing must be reconciled with the provider's published plan documentation.
  entries:
  - label: API Requests
    description: Monthly API request quota across all included endpoints
    name: api_requests
    type: quota
    metric: requests
    limit: 1000
    timeFrame: month
    geo: global
    domains:
    - https://docs.nebius.com/compute
    unit: 1
    price: '0.00'
    userMultiplied: false
  - label: Rate Limit
    description: Maximum requests per minute on the free tier
    name: rate_limit
    type: rate
    metric: requests_per_minute
    limit: 10
    timeFrame: minute
    geo: global
    domains:
    - https://docs.nebius.com/compute
    unit: 1
    price: '0.00'
references:
- name: Nebius API Documentation
  url: https://raw.githubusercontent.com/api-evangelist/nebius/refs/heads/main/apis.yml
